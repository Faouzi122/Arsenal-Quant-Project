version: '3.8'

services:
  arsenal-db:
    image: timescale/timescaledb:latest-pg14 # Utilise l'image TimescaleDB
    container_name: arsenal-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER} # Récupère depuis le fichier .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # Récupère depuis le fichier .env
      POSTGRES_DB: ${POSTGRES_DB} # Récupère depuis le fichier .env
    ports:
      - "${DATABASE_PORT}:5432" # Mappe le port interne 5432 au port défini dans .env (ex: 5432)
    volumes:
      - timescaledb-data:/var/lib/postgresql/data # Volume persistant pour les données

  arsenal-app:
    container_name: arsenal-app
    build:
      context: . # Utilise le Dockerfile dans le répertoire courant
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL} # Passe l'URL complète de la DB à l'application
      INITIAL_CAPITAL: ${INITIAL_CAPITAL} # Passe le capital initial
      # Ajoutez d'autres variables d'environnement si nécessaire (ex: Clés API)
      # BINANCE_API_KEY: ${BINANCE_API_KEY}
      # BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
    depends_on:
      - arsenal-db # S'assure que la DB démarre avant l'app
    # Si votre application doit exposer un port (ex: pour une interface web), ajoutez la section 'ports'
    # ports:
    #   - "8080:80"
    volumes:
      - .:/app # Monte le code local dans /app du conteneur (utile pour dev, optionnel pour prod)

volumes:
  timescaledb-data: # Définit le volume nommé pour la persistance des données DB
